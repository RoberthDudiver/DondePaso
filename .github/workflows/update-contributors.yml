name: Update Contributors

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate contributors snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/generate_contributors.py

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- assets/community/contributors.json; then
            echo "No contributor changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/community/contributors.json
          git commit -m "Update contributors snapshot"
          git push
