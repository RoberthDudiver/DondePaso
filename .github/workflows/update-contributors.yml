name: Update Contributors

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate contributors snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/generate_contributors.py

      - name: Create pull request for updated snapshot
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "Update contributors snapshot"
          branch: "codex/update-contributors-snapshot"
          delete-branch: true
          title: "Update contributors snapshot"
          body: |
            Automated update for `assets/community/contributors.json`.

            This PR was created by the scheduled contributors workflow.
          add-paths: |
            assets/community/contributors.json
